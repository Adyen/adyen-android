plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'kotlin-kapt'
    id 'dagger.hilt.android.plugin'
}

apply from: "local.gradle"
apply from: "${rootDir}/config/gradle/codeQuality.gradle"

android {
    namespace 'com.adyen.checkout.demo'
    compileSdkVersion compile_sdk_version

    defaultConfig {
        applicationId "com.adyen.checkout.demo"
        namespace "com.adyen.checkout.demo"

        minSdkVersion min_sdk_version
        targetSdkVersion target_sdk_version
        versionCode version_code
        versionName version_name

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }


    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        compose true
        viewBinding true
    }
    composeOptions {
        kotlinCompilerExtensionVersion = compose_compiler_version
    }
}

dependencies {
    implementation project(":drop-in-compose")

    // Dependencies
    implementation libraries.kotlinCoroutines

    implementation libraries.androidx.appcompat
    implementation libraries.androidx.recyclerview
    implementation libraries.androidx.constraintlayout
    implementation libraries.androidx.preference

    implementation platform(libraries.compose.bom)
    implementation libraries.compose.ui
    implementation libraries.compose.activity
    implementation libraries.compose.hilt
    implementation libraries.compose.material
    implementation libraries.compose.material3
    implementation libraries.compose.navigation
    implementation libraries.compose.viewmodel

    implementation libraries.hilt
    kapt libraries.hiltCompiler

    implementation libraries.material

    implementation libraries.retrofit
    implementation libraries.moshi
    implementation libraries.okhttpLogging

    implementation("io.coil-kt:coil-compose:2.5.0")

    debugImplementation 'androidx.compose.ui:ui-tooling'
    debugImplementation 'androidx.compose.ui:ui-test-manifest'
}
