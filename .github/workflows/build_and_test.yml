name: Build and test

on:
  workflow_call:
    secrets:
      gradle-encryption-key:
        required: true
      github-token:
        required: true
      sonar-token:
        required: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Analyse, build and test
    runs-on:
      group: larger-runners
      labels: ubuntu-latest-8-cores

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.gradle-encryption-key }}

      - name: Run static code analysis
        run: ./gradlew detekt ktlint -Pstrip-resources=true

      - name: Assemble debug
        run: ./gradlew assembleDebug -Pstrip-resources=true

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest jacocoDebugTestReport -Pstrip-resources=true

      - name: Check lint
        run: ./gradlew lintDebug

      - name: Upload reports to Sonar
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.sonar-token }}
        run: ./gradlew sonar --no-parallel
